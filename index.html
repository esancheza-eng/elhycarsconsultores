<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #1e3c72;
            --secondary-color: #2a5298;
            --accent-color: #00d4ff;
            --success-color: #4caf50;
            --warning-color: #ff9800;
            --danger-color: #f44336;
            --dark-bg: #0f1419;
            --light-bg: #f5f7fa;
            --card-bg: #ffffff;
            --text-dark: #333333;
            --text-light: #666666;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 12px 48px rgba(0, 0, 0, 0.15);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-dark);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* HEADER */
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease;
        }

        header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* SEARCH SECTION */
        .search-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
            animation: fadeInUp 0.8s ease 0.2s backwards;
        }

        .search-box {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            display: flex;
            gap: 10px;
        }

        .search-box input {
            flex: 1;
            border: 2px solid #e0e0e0;
            padding: 12px 15px;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        .search-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .search-btn:active {
            transform: translateY(0);
        }

        .location-btn {
            background: var(--accent-color);
            color: var(--primary-color);
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .location-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        /* CURRENT WEATHER */
        .current-weather {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
            animation: fadeInUp 0.8s ease 0.4s backwards;
            position: relative;
            overflow: hidden;
        }

        .current-weather::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 80% 20%, rgba(0, 212, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .weather-header {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: center;
            position: relative;
            z-index: 1;
            margin-bottom: 30px;
        }

        .location-info h2 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        .location-info p {
            font-size: 1.1rem;
            color: var(--text-light);
            margin-bottom: 5px;
        }

        .weather-icon-section {
            text-align: right;
        }

        .weather-icon {
            font-size: 8rem;
            color: var(--accent-color);
            filter: drop-shadow(0 10px 20px rgba(0, 212, 255, 0.3));
        }

        .temperature-display {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            position: relative;
            z-index: 1;
        }

        .temp-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ebf0 100%);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .temp-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }

        .temp-card h3 {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .temp-card p {
            font-size: 2rem;
            color: var(--primary-color);
            font-weight: 700;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 30px;
            position: relative;
            z-index: 1;
        }

        .detail-item {
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ebf0 100%);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .detail-item i {
            font-size: 2rem;
            color: var(--accent-color);
            margin-bottom: 10px;
        }

        .detail-item h4 {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-bottom: 5px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .detail-item p {
            font-size: 1.3rem;
            color: var(--primary-color);
            font-weight: 700;
        }

        /* FORECAST */
        .forecast-section {
            animation: fadeInUp 0.8s ease 0.6s backwards;
        }

        .section-title {
            color: white;
            font-size: 1.8rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .forecast-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .forecast-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-hover);
            background: linear-gradient(135deg, var(--accent-color), var(--secondary-color));
            color: white;
        }

        .forecast-card:hover .forecast-temp {
            color: white;
        }

        .forecast-card:hover .forecast-icon {
            color: white;
        }

        .forecast-time {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-bottom: 10px;
            font-weight: 600;
        }

        .forecast-card:hover .forecast-time {
            color: rgba(255, 255, 255, 0.9);
        }

        .forecast-icon {
            font-size: 3rem;
            margin: 10px 0;
            color: var(--accent-color);
            transition: color 0.3s ease;
        }

        .forecast-temp {
            font-size: 1.3rem;
            color: var(--primary-color);
            font-weight: 700;
            transition: color 0.3s ease;
        }

        .forecast-description {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-top: 8px;
        }

        /* HOURLY FORECAST */
        .hourly-section {
            animation: fadeInUp 0.8s ease 0.8s backwards;
        }

        .hourly-scroll {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 20px 0;
            scroll-behavior: smooth;
        }

        .hourly-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: var(--shadow);
            min-width: 120px;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .hourly-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
        }

        .hourly-scroll::-webkit-scrollbar {
            height: 8px;
        }

        .hourly-scroll::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .hourly-scroll::-webkit-scrollbar-thumb {
            background: var(--accent-color);
            border-radius: 10px;
        }

        /* ERROR & LOADING */
        .error-message {
            background: linear-gradient(135deg, #f44336 0%, #e53935 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            animation: slideInDown 0.5s ease;
        }

        .error-message i {
            font-size: 1.5rem;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .no-data {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: var(--shadow);
            color: var(--text-light);
        }

        /* ANIMATIONS */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* FAVORITES */
        .favorites-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
            animation: fadeInUp 0.8s ease 0.3s backwards;
        }

        .favorites-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--primary-color);
        }

        .favorites-list {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .favorite-tag {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .favorite-tag:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .favorite-tag .remove {
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }

        .favorite-tag .remove:hover {
            opacity: 1;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }

            .search-section {
                grid-template-columns: 1fr;
            }

            .weather-header {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .weather-icon-section {
                text-align: center;
            }

            .location-info h2 {
                font-size: 1.8rem;
            }

            .forecast-grid {
                grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            }

            .current-weather {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>
                <i class="fas fa-cloud-sun"></i>
                Weather Dashboard
            </h1>
            <p>Real-time weather information for any location</p>
        </header>

        <!-- SEARCH SECTION -->
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search by city name..." />
                <button class="search-btn" onclick="searchWeather()">
                    <i class="fas fa-search"></i>
                    Search
                </button>
            </div>
            <button class="location-btn" onclick="getLocationWeather()">
                <i class="fas fa-location-dot"></i>
                Current Location
            </button>
        </div>

        <!-- FAVORITES -->
        <div class="favorites-section" id="favoritesSection" style="display: none;">
            <div class="favorites-title">
                <i class="fas fa-star"></i>
                Favorite Cities
            </div>
            <div class="favorites-list" id="favoritesList"></div>
        </div>

        <!-- ERROR MESSAGE -->
        <div id="errorMessage" style="display: none;"></div>

        <!-- LOADING -->
        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
        </div>

        <!-- NO DATA -->
        <div id="noData" class="no-data" style="display: none;">
            <i class="fas fa-search" style="font-size: 3rem; margin-bottom: 10px; color: var(--text-light);"></i>
            <p>Search for a city to get started</p>
        </div>

        <!-- CURRENT WEATHER -->
        <div id="currentWeather" style="display: none;"></div>

        <!-- FORECAST -->
        <div id="forecastSection" style="display: none;">
            <h2 class="section-title">
                <i class="fas fa-calendar-days"></i>
                5-Day Forecast
            </h2>
            <div class="forecast-grid" id="forecastGrid"></div>
        </div>

        <!-- HOURLY FORECAST -->
        <div id="hourlySection" class="hourly-section" style="display: none;">
            <h2 class="section-title">
                <i class="fas fa-clock"></i>
                Hourly Forecast
            </h2>
            <div class="hourly-scroll" id="hourlyForecast"></div>
        </div>
    </div>

    <script>
        // API Configuration
        const API_KEY = 'b6fd4d4499c2dc1196181125241512'; // Using weatherapi.com
        const API_BASE_URL = 'https://api.weatherapi.com/v1';

        // DOM Elements
        const searchInput = document.getElementById('searchInput');
        const errorMessage = document.getElementById('errorMessage');
        const loading = document.getElementById('loading');
        const noData = document.getElementById('noData');
        const currentWeatherDiv = document.getElementById('currentWeather');
        const forecastSection = document.getElementById('forecastSection');
        const hourlySection = document.getElementById('hourlySection');
        const favoritesSection = document.getElementById('favoritesSection');
        const favoritesList = document.getElementById('favoritesList');

        // Favorites Management
        let favorites = JSON.parse(localStorage.getItem('weatherFavorites')) || [];

        function saveFavorites() {
            localStorage.setItem('weatherFavorites', JSON.stringify(favorites));
            updateFavoritesList();
        }

        function addFavorite(city) {
            if (!favorites.includes(city)) {
                favorites.push(city);
                saveFavorites();
            }
        }

        function removeFavorite(city) {
            favorites = favorites.filter(fav => fav !== city);
            saveFavorites();
        }

        function updateFavoritesList() {
            if (favorites.length === 0) {
                favoritesSection.style.display = 'none';
                return;
            }

            favoritesSection.style.display = 'block';
            favoritesList.innerHTML = favorites.map(city => `
                <div class="favorite-tag">
                    <span onclick="searchWeatherByCity('${city}')" style="cursor: pointer;">${city}</span>
                    <span class="remove" onclick="removeFavorite('${city}'); updateFavoritesList();">×</span>
                </div>
            `).join('');
        }

        // Error Handling
        function showError(message) {
            errorMessage.innerHTML = `
                <i class="fas fa-exclamation-circle"></i>
                <span>${message}</span>
            `;
            errorMessage.style.display = 'flex';
            currentWeatherDiv.style.display = 'none';
            forecastSection.style.display = 'none';
            hourlySection.style.display = 'none';
            noData.style.display = 'none';
            loading.style.display = 'none';
        }

        function hideError() {
            errorMessage.style.display = 'none';
        }

        // Weather Functions
        async function searchWeather() {
            const city = searchInput.value.trim();
            if (city) {
                searchWeatherByCity(city);
            } else {
                showError('Please enter a city name');
            }
        }

        async function searchWeatherByCity(city) {
            hideError();
            loading.style.display = 'flex';
            noData.style.display = 'none';

            try {
                const response = await fetch(
                    `${API_BASE_URL}/forecast.json?key=${API_KEY}&q=${city}&days=5&aqi=yes`
                );

                if (!response.ok) {
                    throw new Error('City not found. Please try another location.');
                }

                const data = await response.json();
                displayWeather(data);
                addFavorite(data.location.name);
                searchInput.value = '';
                loading.style.display = 'none';
            } catch (error) {
                showError(error.message);
                loading.style.display = 'none';
            }
        }

        function getLocationWeather() {
            hideError();
            loading.style.display = 'flex';

            if ('geolocation' in navigator) {
                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        const { latitude, longitude } = position.coords;
                        try {
                            const response = await fetch(
                                `${API_BASE_URL}/forecast.json?key=${API_KEY}&q=${latitude},${longitude}&days=5&aqi=yes`
                            );

                            if (!response.ok) {
                                throw new Error('Unable to fetch weather for your location');
                            }

                            const data = await response.json();
                            displayWeather(data);
                            addFavorite(data.location.name);
                            loading.style.display = 'none';
                        } catch (error) {
                            showError(error.message);
                            loading.style.display = 'none';
                        }
                    },
                    (error) => {
                        showError('Unable to access your location. Please enable location services.');
                        loading.style.display = 'none';
                    }
                );
            } else {
                showError('Geolocation is not supported by your browser');
                loading.style.display = 'none';
            }
        }

        function displayWeather(data) {
            const { location, current, forecast } = data;

            // Current Weather
            currentWeatherDiv.innerHTML = `
                <div class="current-weather">
                    <div class="weather-header">
                        <div class="location-info">
                            <h2>${location.name}, ${location.country}</h2>
                            <p>${current.condition.text}</p>
                            <p style="font-size: 0.9rem; margin-top: 5px;">
                                <i class="fas fa-calendar"></i>
                                ${new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}
                            </p>
                        </div>
                        <div class="weather-icon-section">
                            <i class="fas ${getWeatherIcon(current.condition.code)} weather-icon"></i>
                        </div>
                    </div>

                    <div class="temperature-display">
                        <div class="temp-card">
                            <h3>Temperature</h3>
                            <p>${Math.round(current.temp_c)}°C</p>
                        </div>
                        <div class="temp-card">
                            <h3>Feels Like</h3>
                            <p>${Math.round(current.feelslike_c)}°C</p>
                        </div>
                        <div class="temp-card">
                            <h3>Min / Max</h3>
                            <p>${Math.round(forecast.forecastday[0].day.mintemp_c)}° / ${Math.round(forecast.forecastday[0].day.maxtemp_c)}°</p>
                        </div>
                        <div class="temp-card">
                            <h3>Humidity</h3>
                            <p>${current.humidity}%</p>
                        </div>
                    </div>

                    <div class="weather-details">
                        <div class="detail-item">
                            <i class="fas fa-wind"></i>
                            <h4>Wind Speed</h4>
                            <p>${current.wind_kph} km/h</p>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-droplet"></i>
                            <h4>Pressure</h4>
                            <p>${current.pressure_mb} mb</p>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-eye"></i>
                            <h4>Visibility</h4>
                            <p>${current.vis_km} km</p>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-sun"></i>
                            <h4>UV Index</h4>
                            <p>${current.uv}</p>
                        </div>
                    </div>
                </div>
            `;

            currentWeatherDiv.style.display = 'block';

            // 5-Day Forecast
            const forecastGrid = document.getElementById('forecastGrid');
            forecastGrid.innerHTML = forecast.forecastday.map(day => `
                <div class="forecast-card">
                    <div class="forecast-time">${new Date(day.date).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}</div>
                    <i class="fas ${getWeatherIcon(day.day.condition.code)} forecast-icon"></i>
                    <div class="forecast-temp">${Math.round(day.day.maxtemp_c)}°</div>
                    <div class="forecast-description">${day.day.condition.text}</div>
                </div>
            `).join('');

            forecastSection.style.display = 'block';

            // Hourly Forecast
            const hourlyForecast = document.getElementById('hourlyForecast');
            const hourlyData = forecast.forecastday[0].hour;
            hourlyForecast.innerHTML = hourlyData.map(hour => {
                const hourTime = new Date(hour.time).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
                return `
                    <div class="hourly-card">
                        <div class="forecast-time">${hourTime}</div>
                        <i class="fas ${getWeatherIcon(hour.condition.code)} forecast-icon"></i>
                        <div class="forecast-temp">${Math.round(hour.temp_c)}°</div>
                        <div class="forecast-description">${hour.condition.text}</div>
                    </div>
                `;
            }).join('');

            hourlySection.style.display = 'block';
        }

        function getWeatherIcon(code) {
            const iconMap = {
                1000: 'fa-sun',           // Sunny
                1003: 'fa-cloud-sun',     // Partly cloudy
                1006: 'fa-cloud',         // Cloudy
                1009: 'fa-cloud',         // Overcast
                1012: 'fa-cloud',         // Overcast
                1015: 'fa-wind',          // Light wind
                1018: 'fa-cloud',         // Cloudy
                1021: 'fa-cloud',         // Cloudy
